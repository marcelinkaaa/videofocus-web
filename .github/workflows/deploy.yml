name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/marcelinkaaa/videofocus-web:latest
            ghcr.io/marcelinkaaa/videofocus-web:${{ github.sha }}

      - name: Build and push sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./sidecar
          push: true
          tags: |
            ghcr.io/marcelinkaaa/videofocus-sidecar:latest
            ghcr.io/marcelinkaaa/videofocus-sidecar:${{ github.sha }}
