# Development only — production services are in the dockerhost repo
services:
  videofocus-api:
    build: .
    restart: unless-stopped
    mem_limit: 128m
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - ytdlp-sidecar
      - redis

  ytdlp-sidecar:
    build: ./sidecar
    restart: unless-stopped
    mem_limit: 192m
    environment:
      - YT_DLP_POOL_SIZE=3

  redis:
    image: redis:7-alpine
    mem_limit: 64m
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
